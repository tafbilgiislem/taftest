<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Fullscreen Inline SVG Slider</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
    background-color: #000; display: flex; justify-content: center; align-items: center;
  }

  #slider {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  .slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }

  .slide.active {
    opacity: 1;
  }

  /* Örnek efektler */
  .fade { opacity: 0; }
  .fade.active { opacity: 1; }

  .slide-left { transform: translateX(100%); opacity: 0; }
  .slide-left.active { transform: translateX(0); opacity: 1; transition: all 1s ease-in-out; }

  .zoom { transform: scale(0.5); opacity: 0; }
  .zoom.active { transform: scale(1); opacity: 1; transition: all 1s ease-in-out; }
</style>
</head>
<body>

<div id="slider"></div>

<script>
  const svgUrls = [
    "slide1.svg",
    "slide2.svg",
    "slide3.svg"
  ];

  const slideDurations = [2000, 5000, 3000]; // ms
  const slideEffects = ["fade", "slide-left", "zoom"];

  const slider = document.getElementById("slider");
  let slides = [];
  let currentIndex = 0;
  let timeoutId;

  // SVG'leri fetch ile alıp inline ekle
  svgUrls.forEach(async (url, i) => {
    const res = await fetch(url);
    let svgText = await res.text();

    const div = document.createElement("div");
    div.classList.add("slide", slideEffects[i]);
    div.innerHTML = svgText; // SVG inline ekleniyor
    if(i === 0) div.classList.add("active");

    slider.appendChild(div);
    slides.push(div);
  });

  function showSlide(index){
    slides.forEach((slide, i) => {
      slide.classList.remove("active");
      if(i === index) slide.classList.add("active");
    });
    currentIndex = index;

    clearTimeout(timeoutId);
    let next = currentIndex + 1;
    if(next >= slides.length) next = 0;
    timeoutId = setTimeout(() => showSlide(next), slideDurations[currentIndex]);
  }

  // SVG’lerin yüklenmesini bekleyip başlat
  const waitForSlides = setInterval(() => {
    if(slides.length === svgUrls.length){
      clearInterval(waitForSlides);
      showSlide(0);
    }
  }, 100);
</script>

</body>
</html>
