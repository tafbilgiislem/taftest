<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Fullscreen SVG Slider - Object</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background-color: #000; display: flex; justify-content: center; align-items: center;
    overflow: hidden;
  }

  #slider {
    position: relative; width: 100vw; height: 100vh;
  }

  .slide {
    position: absolute;
    width: 100%; height: 100%;
    opacity: 0;
    transition: all 1s ease-in-out;
  }

  .slide.active {
    opacity: 1;
  }

  /* Farklı efektler */
  .fade { opacity: 0; }
  .fade.active { opacity: 1; }

  .slide-left { transform: translateX(100%); opacity: 0; }
  .slide-left.active { transform: translateX(0); opacity: 1; transition: all 1s ease-in-out; }

  .zoom { transform: scale(0.5); opacity: 0; }
  .zoom.active { transform: scale(1); opacity: 1; transition: all 1s ease-in-out; }
</style>
</head>
<body>

<div id="slider"></div>

<script>
  const svgFiles = ["slide1.svg","slide2.svg","slide3.svg"];
  const slideDurations = [3000,5000,4000];
  const slideEffects = ["fade","slide-left","zoom"];

  const slider = document.getElementById("slider");
  let slides = [];
  let currentIndex = 0;
  let timeoutId;

  svgFiles.forEach((file, i) => {
    const obj = document.createElement("object");
    obj.data = file;
    obj.type = "image/svg+xml";
    obj.classList.add("slide", slideEffects[i]);
    obj.style.width = "100%";
    obj.style.height = "100%";
    slider.appendChild(obj);
    slides.push(obj);
  });

  function showSlide(index){
    slides.forEach((slide,i)=>{
      slide.classList.remove("active");
      if(i===index) slide.classList.add("active");
    });
    currentIndex = index;
    clearTimeout(timeoutId);
    let next = currentIndex+1;
    if(next>=slides.length) next=0;
    timeoutId = setTimeout(()=>showSlide(next),slideDurations[currentIndex]);
  }

  // Başlat
  showSlide(0);
</script>

</body>
</html>
